<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>验证码监听</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --card:     #1a1d27;
      --border:   #2a2d3e;
      --accent:   #4f8ef7;
      --accent2:  #7c3aed;
      --success:  #22c55e;
      --warning:  #f59e0b;
      --danger:   #ef4444;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   14px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 100px;
    }

    /* ── 顶部标题 ── */
    header {
      text-align: center;
      margin-bottom: 28px;
      width: 100%;
      max-width: 520px;
    }
    header h1 {
      font-size: clamp(1.4rem, 5vw, 1.9rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: clamp(0.78rem, 3vw, 0.88rem);
      line-height: 1.5;
    }

    /* ── 卡片 ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(18px, 5vw, 28px) clamp(16px, 5vw, 28px);
      width: 100%;
      max-width: 520px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── 表单 ── */
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="email"], input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;           /* 防止 iOS 自动放大 */
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    /* ── 按钮 ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      padding: 13px 20px;
      width: 100%;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-appearance: none;
      touch-action: manipulation;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .btn-stop {
      background: rgba(239,68,68,0.12);
      color: var(--danger);
      border: 1px solid rgba(239,68,68,0.3);
      margin-top: 10px;
    }

    /* ── 状态栏 ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-top: 14px;
      border: 1px solid transparent;
      line-height: 1.4;
    }
    .status-idle    { background: rgba(100,116,139,0.1); border-color: var(--border); color: var(--muted); }
    .status-listen  { background: rgba(79,142,247,0.1);  border-color: rgba(79,142,247,0.3); color: var(--accent); }
    .status-success { background: rgba(34,197,94,0.1);   border-color: rgba(34,197,94,0.3);  color: var(--success); }
    .status-error   { background: rgba(239,68,68,0.1);   border-color: rgba(239,68,68,0.3);  color: var(--danger); }
    .status-timeout { background: rgba(245,158,11,0.1);  border-color: rgba(245,158,11,0.3); color: var(--warning); }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: currentColor; }
    .dot.pulse { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.65); }
    }

    /* ── 进度条 ── */
    .progress-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 12px; overflow: hidden; display: none; }
    .progress-wrap.show { display: block; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 3s linear; }

    /* ── 验证码展示 ── */
    .code-display {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 20px;
      background: rgba(34,197,94,0.06);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: var(--radius);
      margin-top: 14px;
      text-align: center;
    }
    .code-display.show { display: flex; }
    .code-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .code-value {
      font-size: clamp(2.4rem, 12vw, 3.2rem);
      font-weight: 800;
      letter-spacing: 0.2em;
      color: var(--success);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      user-select: all;
      -webkit-user-select: all;
    }
    .code-meta { font-size: 0.75rem; color: var(--muted); margin-top: 8px; }

    /* ── 复制按钮 ── */
    .btn-copy {
      margin-top: 14px;
      background: rgba(34,197,94,0.15);
      color: var(--success);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-appearance: none;
      touch-action: manipulation;
      min-width: 140px;
    }
    .btn-copy:active { transform: scale(0.96); }
    .btn-copy.copied {
      background: rgba(34,197,94,0.3);
      color: #fff;
    }

    /* ── Toast 提示 ── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(34,197,94,0.92);
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 100px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 9999;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.error-toast { background: rgba(239,68,68,0.92); }

    /* ── 活跃监听列表 ── */
    .session-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      margin-bottom: 8px;
      font-size: 0.83rem;
    }
    .s-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; animation: pulse 1.2s ease-in-out infinite; }
    .s-email { color: var(--text); font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .s-remaining { color: var(--muted); font-size: 0.75rem; flex-shrink: 0; }
    .empty-tip { color: var(--muted); font-size: 0.83rem; text-align: center; padding: 10px 0; }

    /* ── 历史记录 ── */
    .history-list { max-height: 240px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .history-list::-webkit-scrollbar { width: 3px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .hist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .hist-code { font-weight: 700; color: var(--success); letter-spacing: 0.12em; font-size: 1rem; min-width: 68px; flex-shrink: 0; }
    .hist-email { color: var(--muted); font-size: 0.78rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hist-time  { color: var(--muted); font-size: 0.72rem; flex-shrink: 0; }
    .hist-copy  {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.72rem;
      flex-shrink: 0;
      touch-action: manipulation;
      -webkit-appearance: none;
    }
    .hist-copy:active { background: var(--border); color: var(--text); }

    /* ── 手机端底部安全区 ── */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      body { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
    }

    /* ── 小屏微调 ── */
    @media (max-width: 380px) {
      .hist-time { display: none; }
      .hist-email { font-size: 0.72rem; }
    }
  </style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<header>
  <h1>验证码监听</h1>
  <p>输入账号邮箱与辅助邮箱，自动监听 Microsoft 一次性验证码</p>
</header>

<!-- 主操作卡片 -->
<div class="card">
  <div class="card-title">新建监听</div>

  <div class="field">
    <label for="inp-email">账号邮箱（Microsoft 账号）</label>
    <input id="inp-email" type="email" inputmode="email" placeholder="example@hotmail.com" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
  </div>
  <div class="field" style="margin-bottom:18px">
    <label for="inp-helper">辅助邮箱（验证码发送目标）</label>
    <input id="inp-helper" type="email" inputmode="email" placeholder="28@itai.im" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
  </div>

  <button id="btn-start" class="btn btn-primary" onclick="startListen()">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    开始监听
  </button>
  <button id="btn-stop" class="btn btn-stop" style="display:none" onclick="stopListen()">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
    停止监听
  </button>

  <!-- 进度条 -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar" id="progress-bar" style="width:100%"></div>
  </div>

  <!-- 状态栏 -->
  <div class="status-bar status-idle" id="status-bar">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">等待开始监听</span>
  </div>

  <!-- 验证码展示 -->
  <div class="code-display" id="code-display">
    <div class="code-label">验证码</div>
    <div class="code-value" id="code-value">------</div>
    <div class="code-meta" id="code-meta"></div>
    <button class="btn-copy" id="btn-copy" onclick="copyCode()">复制验证码</button>
  </div>
</div>

<!-- 活跃监听 -->
<div class="card">
  <div class="card-title">
    <span>当前活跃监听 <span id="session-count" style="color:var(--accent)">0</span></span>
  </div>
  <div id="session-list"><div class="empty-tip">暂无活跃监听</div></div>
</div>

<!-- 历史记录 -->
<div class="card">
  <div class="card-title">
    <span>历史记录</span>
    <button onclick="clearHistory()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.75rem;padding:2px 6px;border-radius:4px;touch-action:manipulation">清空</button>
  </div>
  <div class="history-list" id="history-list"><div class="empty-tip">暂无记录</div></div>
</div>

<script>
// ============================================================
// 状态
// ============================================================
let currentEs     = null;
let currentEmail  = '';
let currentHelper = '';
let currentCode   = '';
const activeSessions = new Map();
const history = [];

// ============================================================
// Toast 提示（兼容所有环境，替代 alert）
// ============================================================
let toastTimer = null;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'show' + (isError ? ' error-toast' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = isError ? 'error-toast' : ''; }, 2200);
}

// ============================================================
// 复制函数（兼容 HTTP 非安全上下文）
// ============================================================
function copyText(text, onSuccess, onFail) {
  // 方式1：Clipboard API（HTTPS / localhost）
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(() => fallback(text, onSuccess, onFail));
    return;
  }
  // 方式2：execCommand 降级（HTTP 环境）
  fallback(text, onSuccess, onFail);
}

function fallback(text, onSuccess, onFail) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, 99999); // 手机端
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) { onSuccess(); } else { onFail(); }
  } catch (e) {
    if (onFail) onFail();
  }
}

// ============================================================
// 复制验证码按钮
// ============================================================
function copyCode() {
  if (!currentCode) return;
  const btn = document.getElementById('btn-copy');
  copyText(
    currentCode,
    () => {
      btn.textContent = '✓ 已复制';
      btn.classList.add('copied');
      showToast('验证码已复制到剪贴板 ✓');
      setTimeout(() => { btn.textContent = '复制验证码'; btn.classList.remove('copied'); }, 2500);
    },
    () => {
      showToast('复制失败，请长按验证码手动复制', true);
    }
  );
}

// ============================================================
// 工具
// ============================================================
function nowIso() { return new Date().toISOString(); }
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function setStatus(type, text) {
  const bar  = document.getElementById('status-bar');
  const dot  = document.getElementById('status-dot');
  bar.className    = `status-bar status-${type}`;
  dot.className    = `dot${type === 'listen' ? ' pulse' : ''}`;
  document.getElementById('status-text').textContent = text;
}

function showCode(code, helper, ts) {
  const disp = document.getElementById('code-display');
  disp.classList.add('show');
  document.getElementById('code-value').textContent = code;
  document.getElementById('code-meta').textContent  = `${helper}  ·  ${fmtTime(ts)}`;
  document.getElementById('btn-copy').textContent   = '复制验证码';
  document.getElementById('btn-copy').classList.remove('copied');
  currentCode = code;
}

function hideCode() {
  document.getElementById('code-display').classList.remove('show');
  currentCode = '';
}

// ============================================================
// 活跃监听渲染
// ============================================================
function renderSessions() {
  const list  = document.getElementById('session-list');
  const count = document.getElementById('session-count');
  count.textContent = activeSessions.size;
  if (!activeSessions.size) { list.innerHTML = '<div class="empty-tip">暂无活跃监听</div>'; return; }
  list.innerHTML = '';
  for (const [, s] of activeSessions) {
    const div = document.createElement('div');
    div.className = 'session-item';
    div.innerHTML = `<div class="s-dot"></div>
      <div class="s-email" title="${s.helper}">${s.helper}</div>
      <div class="s-remaining">剩余 ${s.remaining ?? '—'}s</div>`;
    list.appendChild(div);
  }
}

// ============================================================
// 历史记录渲染
// ============================================================
function renderHistory() {
  const list = document.getElementById('history-list');
  if (!history.length) { list.innerHTML = '<div class="empty-tip">暂无记录</div>'; return; }
  list.innerHTML = '';
  for (let i = history.length - 1; i >= 0; i--) {
    const h   = history[i];
    const div = document.createElement('div');
    div.className = 'hist-item';
    const btn = document.createElement('button');
    btn.className   = 'hist-copy';
    btn.textContent = '复制';
    btn.onclick = () => {
      copyText(h.code,
        () => { btn.textContent = '✓'; showToast(`${h.code} 已复制`); setTimeout(() => { btn.textContent = '复制'; }, 2000); },
        () => { showToast('复制失败，请手动复制', true); }
      );
    };
    div.innerHTML = `<span class="hist-code">${h.code}</span>
      <span class="hist-email" title="${h.helper}">${h.helper}</span>
      <span class="hist-time">${fmtTime(h.ts)}</span>`;
    div.appendChild(btn);
    list.appendChild(div);
  }
}

function clearHistory() { history.length = 0; renderHistory(); }

// ============================================================
// 开始监听
// ============================================================
function startListen() {
  const email  = document.getElementById('inp-email').value.trim();
  const helper = document.getElementById('inp-helper').value.trim();

  if (!email || !email.includes('@')) { showToast('请输入有效的账号邮箱', true); return; }
  if (!helper || !helper.includes('@')) { showToast('请输入有效的辅助邮箱', true); return; }

  if (currentEs) { currentEs.close(); currentEs = null; }

  currentEmail  = email;
  currentHelper = helper;
  hideCode();

  const since = nowIso();
  const key   = `${email}|${helper}`;

  activeSessions.set(key, { email, helper, remaining: 300, startTs: since });
  renderSessions();

  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').style.display = 'flex';
  document.getElementById('progress-wrap').classList.add('show');
  document.getElementById('progress-bar').style.transition = 'none';
  document.getElementById('progress-bar').style.width = '100%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('progress-bar').style.transition = 'width 300s linear';
    document.getElementById('progress-bar').style.width = '0%';
  }));

  setStatus('listen', `正在监听 ${helper}...`);

  const url = `/api/listen?email=${encodeURIComponent(email)}&helper=${encodeURIComponent(helper)}&since=${encodeURIComponent(since)}`;
  const es  = new EventSource(url);
  currentEs = es;

  es.addEventListener('connected', e => {
    setStatus('listen', JSON.parse(e.data).message);
  });

  es.addEventListener('ping', e => {
    const d = JSON.parse(e.data);
    if (activeSessions.has(key)) { activeSessions.get(key).remaining = d.remaining; renderSessions(); }
    setStatus('listen', `正在监听 ${helper}... 剩余 ${d.remaining}s`);
  });

  es.addEventListener('code', e => {
    const d = JSON.parse(e.data);
    setStatus('success', `✓ 验证码已获取`);
    showCode(d.code, d.helper, d.ts);
    showToast(`验证码：${d.code}`);
    history.push({ code: d.code, email: d.email, helper: d.helper, ts: d.ts });
    renderHistory();
    activeSessions.delete(key);
    renderSessions();
    resetForm();
    es.close(); currentEs = null;
  });

  es.addEventListener('timeout', e => {
    setStatus('timeout', JSON.parse(e.data).message);
    showToast('监听超时，请重新发起', true);
    activeSessions.delete(key); renderSessions();
    resetForm(); es.close(); currentEs = null;
  });

  es.addEventListener('error', () => {
    if (es.readyState === EventSource.CLOSED) {
      setStatus('error', '连接已断开');
      activeSessions.delete(key); renderSessions();
      resetForm(); currentEs = null;
    }
  });
}

// ============================================================
// 停止监听
// ============================================================
function stopListen() {
  if (currentEs) { currentEs.close(); currentEs = null; }
  activeSessions.delete(`${currentEmail}|${currentHelper}`);
  renderSessions();
  setStatus('idle', '监听已手动停止');
  resetForm();
}

function resetForm() {
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('progress-wrap').classList.remove('show');
  document.getElementById('progress-bar').style.transition = 'none';
  document.getElementById('progress-bar').style.width = '100%';
}

// ============================================================
// 初始化
// ============================================================
renderSessions();
renderHistory();
</script>
</body>
</html>
